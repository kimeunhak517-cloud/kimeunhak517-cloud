name: Update profile visuals

'on':
  workflow_dispatch:
  schedule:
    - cron: '2 20 * * *'   # 05:02 Asia/Seoul
    - cron: '2 2 * * *'    # 11:02 Asia/Seoul
    - cron: '2 8 * * *'    # 17:02 Asia/Seoul
    - cron: '2 13 * * *'   # 22:02 Asia/Seoul

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Generate greeting, banner, and cards
        env:
          USERNAME: ${{ github.repository_owner }}
        run: python .github/scripts/update_profile_assets.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current-banner.png assets/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update profile visuals"
            git push
          fi
